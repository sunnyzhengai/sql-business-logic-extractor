# Epic Clarity Schema Graph Definition
# Initial subset for MVP (Referrals, Appointments, Visits domain)
# Expanded with Inpatient, Surgery, and Billing Diagnosis workflows

tables:
  - name: PATIENT
    data_source: Epic Clarity
    primary_key: PAT_ID
    description: Patient demographic and registration information. Contains patient names - filter on PAT_NAME when searching by patient name.
    is_enum_table: true
    enum_column: PAT_NAME
    columns:
      - name: PAT_ID
        type: VARCHAR(18)
        description: Unique patient identifier
      - name: PAT_NAME
        type: VARCHAR
        description: Patient full name
      - name: BIRTH_DATE
        type: DATE
        description: Patient date of birth
      - name: SEX
        type: VARCHAR(1)
        description: Patient sex
      - name: ADD_LINE_1
        type: VARCHAR(254)
        description: Patient address line 1
      - name: CITY
        type: VARCHAR(50)
        description: Patient city
      - name: STATE
        type: VARCHAR(50)
        description: Patient state
      - name: ZIP
        type: VARCHAR(20)
        description: Patient zip code

  - name: REFERRAL
    data_source: Epic Clarity
    primary_key: REFERRAL_ID
    description: Referral orders and tracking
    columns:
      - name: REFERRAL_ID
        type: INTEGER
        description: Unique referral identifier
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient receiving referral
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: PCP_PROV_ID
        type: VARCHAR(18)
        description: The ID of thePrimary care provider at the time the referral was created.
        foreign_key:
          table: CLARITY_SER
          column: PROV_ID
          cardinality: many-to-one
      - name: ENTRY_DATE
        type: DATETIME
        description: Date referral was created
      - name: REFERRAL_STATUS_C
        type: INTEGER
        description: The category value corresponding to the status of each referral record.
        foreign_key:
          table: ZC_RFL_STATUS
          column: RFL_STATUS_C
          cardinality: many-to-one
      - name: REFERRING_PROV_ID
        type: VARCHAR(18)
        description: Provider who made the referral
        foreign_key:
          table: CLARITY_SER
          column: PROV_ID
          cardinality: many-to-one
      - name: PROV_SPEC_C
        type: INTEGER
        description: Specialty code for referral
        foreign_key:
          table: ZC_SPECIALTY
          column: SPECIALTY_C
          cardinality: many-to-one
      - name: RFL_TYPE_C
        type: INTEGER
        description: The category value indicating the type of each referral record.
        foreign_key:
          table: ZC_RFL_TYPE
          column: RFL_TYPE_C
          cardinality: many-to-one
      - name: RFL_CLASS_C
        type: INTEGER
        description: The category value indicating the class of each referral record.
        foreign_key:
          table: ZC_RFL_CLASS
          column: RFL_CLASS_C
          cardinality: many-to-one
      - name: ENTRY_SOURCE_C
        type: INTEGER
        description: Source of referral
        foreign_key:
          table: ZC_ENTRY_SOURCE
          column: ENTRY_SOURCE_C
          cardinality: many-to-one

  - name: PAT_ENC
    data_source: Epic Clarity
    primary_key: PAT_ENC_CSN_ID
    description: Patient encounters (appointments and visits)
    columns:
      - name: PAT_ENC_CSN_ID
        type: INTEGER
        description: Unique encounter/appointment identifier (CSN)
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient for this encounter
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: APPT_TIME
        type: DATETIME
        description: Appointment date and time
      - name: APPT_STATUS_C
        type: INTEGER
        description: Appointment status
        foreign_key:
          table: ZC_APPT_STATUS
          column: APPT_STATUS_C
          cardinality: many-to-one
      - name: DEPARTMENT_ID
        type: INTEGER
        description: Department for appointment
        foreign_key:
          table: CLARITY_DEP
          column: DEPARTMENT_ID
          cardinality: many-to-one
      - name: VISIT_PROV_ID
        type: VARCHAR(18)
        description: Provider for appointment
        foreign_key:
          table: CLARITY_SER
          column: PROV_ID
          cardinality: many-to-one
      - name: APPT_MADE_DATE
        type: DATETIME
        description: When appointment was scheduled
      - name: APPT_CANCEL_DATE
        type: DATETIME
        description: When appointment was cancelled
      - name: APPT_DATE
        type: DATE
        description: Appointment date (for filtering/grouping)
      - name: CONTACT_DATE
        type: DATE
        description: Contact date for the encounter
      - name: ENC_TYPE_C
        type: INTEGER
        description: Encounter type (1-Registration, 2-Walk-In, 3-Hospital, 5-Canceled, etc.)
        foreign_key:
          table: ZC_DISP_ENC_TYPE
          column: ENC_TYPE_C
          cardinality: many-to-one
      - name: REFERRAL_ID
        type: INTEGER
        description: Referral associated with this encounter
        foreign_key:
          table: REFERRAL
          column: REFERRAL_ID
          cardinality: many-to-one
      - name: CANCEL_REASON_C
        type: INTEGER
        description: Cancellation reason
        foreign_key:
          table: ZC_CANCEL_REASON
          column: CANCEL_REASON_C
          cardinality: many-to-one

  - name: PAT_ENC_DX
    data_source: Epic Clarity
    primary_key: "PAT_ENC_CSN_ID, LINE"
    description: Encounter diagnosis codes. Stores diagnoses associated with specific patient encounters (Outpatient, ED, etc.). Not used for hospital admission/discharge diagnoses.
    columns:
      - name: PAT_ENC_CSN_ID
        type: INTEGER
        description: Encounter CSN
        foreign_key:
          table: PAT_ENC
          column: PAT_ENC_CSN_ID
          cardinality: many-to-one
      - name: LINE
        type: INTEGER
        description: Line number
      - name: DX_ID
        type: NUMERIC(18,0)
        description: Diagnosis ID
        foreign_key:
          table: CLARITY_EDG
          column: DX_ID
          cardinality: many-to-one
      - name: PRIMARY_YN
        type: VARCHAR(1)
        description: Is this the primary diagnosis?

  - name: PAT_ENC_HSP
    data_source: Epic Clarity
    primary_key: PAT_ENC_CSN_ID
    description: Hospital Encounter data. Stores admission/discharge dates and ADT info. Extension of PAT_ENC for inpatient stays.
    columns:
      - name: PAT_ENC_CSN_ID
        type: INTEGER
        description: Encounter CSN (FK to PAT_ENC)
        foreign_key:
          table: PAT_ENC
          column: PAT_ENC_CSN_ID
          cardinality: one-to-one
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient ID
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: HOSP_ADMSN_TIME
        type: DATETIME
        description: Admission Time
      - name: HOSP_DISCH_TIME
        type: DATETIME
        description: Discharge Time
      - name: ADT_PAT_CLASS_C
        type: INTEGER
        description: Patient Class (Inpatient, Outpatient, Emergency, etc.)
      - name: ACUITY_LEVEL_C
        type: INTEGER
        description: ED acuity/triage level (1-5)
      - name: ADMIT_CONF_STAT_C
        type: INTEGER
        description: Admission confirmation status

  - name: HSP_ADMIT_DIAG
    data_source: Epic Clarity
    primary_key: "PAT_ENC_CSN_ID, LINE"
    description: Hospital Admission Diagnosis. Diagnoses recorded at the time of admission to the hospital. Distinct from final billing diagnoses.
    columns:
      - name: PAT_ENC_CSN_ID
        type: INTEGER
        description: Encounter CSN (FK to PAT_ENC_HSP)
        foreign_key:
          table: PAT_ENC_HSP
          column: PAT_ENC_CSN_ID
          cardinality: many-to-one
      - name: LINE
        type: INTEGER
        description: Line number
      - name: DX_ID
        type: NUMERIC(18,0)
        description: Diagnosis ID
        foreign_key:
          table: CLARITY_EDG
          column: DX_ID
          cardinality: many-to-one

  - name: OR_CASE
    data_source: Epic Clarity
    primary_key: OR_CASE_ID
    description: Surgery Case master file.
    columns:
      - name: OR_CASE_ID
        type: NUMERIC(18,0)
        description: Unique Surgery Case ID
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient ID
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: SURGERY_DATE
        type: DATE
        description: Date of surgery
      - name: ROOM_ID
        type: VARCHAR(18)
        description: Operating Room ID

  - name: OR_CASE_DX_CODE
    data_source: Epic Clarity
    primary_key: "OR_CASE_ID, LINE"
    description: Surgery Case Diagnoses. Pre-op or Post-op diagnoses associated with a surgery case.
    columns:
      - name: OR_CASE_ID
        type: NUMERIC(18,0)
        description: Surgery Case ID
        foreign_key:
          table: OR_CASE
          column: OR_CASE_ID
          cardinality: many-to-one
      - name: LINE
        type: INTEGER
        description: Line number
      - name: DX_ID
        type: NUMERIC(18,0)
        description: Diagnosis ID
        foreign_key:
          table: CLARITY_EDG
          column: DX_ID
          cardinality: many-to-one

  - name: PAT_PCP
    data_source: Epic Clarity
    primary_key: "PAT_ID, PCP_PROV_ID, EFF_DATE"  # Composite key
    description: Patient primary care provider assignments
    columns:
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: PCP_PROV_ID
        type: VARCHAR(18)
        description: Primary care provider
        foreign_key:
          table: CLARITY_SER
          column: PROV_ID
          cardinality: many-to-one
      - name: EFF_DATE
        type: DATETIME
        description: Effective date of PCP assignment
      - name: TERM_DATE
        type: DATETIME
        description: End date of PCP assignment (NULL if active)
      - name: PCP_TYPE_C
        type: INTEGER
        description: PCP type code
        foreign_key:
          table: ZC_PCP_TYPE
          column: PCP_TYPE_C

  - name: CLARITY_SER
    data_source: Epic Clarity
    primary_key: PROV_ID
    description: Provider master file. Contains provider names - filter on PROV_NAME when searching by provider/doctor name.
    is_enum_table: true
    enum_column: PROV_NAME
    columns:
      - name: PROV_ID
        type: VARCHAR(18)
        description: Unique provider identifier
      - name: PROV_NAME
        type: VARCHAR
        description: Provider full name

  - name: CLARITY_DEP
    data_source: Epic Clarity
    primary_key: DEPARTMENT_ID
    description: Department master file. Contains department names - filter on DEPARTMENT_NAME when searching by department.
    is_enum_table: true
    enum_column: DEPARTMENT_NAME
    columns:
      - name: DEPARTMENT_ID
        type: INTEGER
        description: Unique department identifier
      - name: DEPARTMENT_NAME
        type: VARCHAR
        description: Department name
      - name: SPECIALTY
        type: VARCHAR
        description: Department specialty

  - name: PAT_IMMUNIZATION
    data_source: Epic Clarity
    primary_key: "PAT_ID, IMMUNE_ID"  # Composite key
    description: Patient immunization records
    columns:
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient receiving immunization
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: IMMUNE_ID
        type: INTEGER
        description: Immunization record
        foreign_key:
          table: IMMUNE
          column: IMMUNE_ID
          cardinality: many-to-one

  - name: IMMUNE
    data_source: Epic Clarity
    primary_key: IMMUNE_ID
    description: Immunization master records
    columns:
      - name: IMMUNE_ID
        type: INTEGER
        description: Unique immunization identifier
      - name: IMMUNZATN_ID
        type: INTEGER
        description: Immunization type (vaccine)
        foreign_key:
          table: CLARITY_IMMUNZATN
          column: IMMUNZATN_ID
          cardinality: many-to-one
      - name: IMMUNIZATION_DATE
        type: DATE
        description: Date immunization was administered
      - name: IMMUNIZATION_STATUS
        type: VARCHAR
        description: Immunization status (completed, refused, etc.)

  # ========================================================================
  # ZC Tables (Epic Master/Lookup Tables)
  # ========================================================================

  - name: ZC_APPT_STATUS
    data_source: Epic Clarity
    primary_key: APPT_STATUS_C
    description: Appointment status master table
    is_enum_table: true
    columns:
      - name: APPT_STATUS_C
        type: INTEGER
        description: Appointment status code (primary key)
      - name: NAME
        type: VARCHAR
        description: Appointment status name
    values:
      - code: 1
        name: SCHEDULED
      - code: 2
        name: COMPLETED
      - code: 3
        name: CANCELED
      - code: 4
        name: NO SHOW
      - code: 5
        name: LEFT WITHOUT SEEN
      - code: 6
