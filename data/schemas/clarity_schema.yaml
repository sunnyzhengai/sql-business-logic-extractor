  - name: ZC_DISP_ENC_TYPE
    data_source: Epic Clarity
    primary_key: ENC_TYPE_C
    description: Encounter type master table
    is_enum_table: true
    columns:
      - name: ENC_TYPE_C
        type: INTEGER
        description: Encounter type code (primary key)
      - name: NAME
        type: VARCHAR
        description: Encounter type name
    values:
      - code: 1
        name: Registration
      - code: 2
        name: Walk-In
      - code: 3
        name: Hospital Encounter
      - code: 5
        name: Canceled

  - name: ZC_RFL_CLASS
    data_source: Epic Clarity
    primary_key: RFL_CLASS_C
    description: Referral class master table
    is_enum_table: true
    columns:
      - name: RFL_CLASS_C
        type: INTEGER
        description: Referral class category list.
      - name: NAME
        type: VARCHAR
        description: Referral class name
    values:
      - code: 1
        name: Internal
      - code: 2
        name: Incoming
      - code: 3
        name: Outgoing

  - name: ZC_RFL_STATUS
    data_source: Epic Clarity
    primary_key: RFL_STATUS_C
    description: Referral status master table
    is_enum_table: true
    columns:
      - name: RFL_STATUS_C
        type: INTEGER
        description: Referral status category list.
      - name: NAME
        type: VARCHAR
        description: Referral status name
    values:
      - code: 1
        name: Authorized
      - code: 2
        name: Open  
      - code: 3
        name: Pending Review
      - code: 4
        name: Canceled
      - code: 5
        name: Denied
      - code: 6
        name: Closed  
      - code: 7
        name: New Request
      - code: 8
        name: Incomplete

  - name: ZC_RFL_TYPE
    data_source: Epic Clarity
    primary_key: RFL_TYPE_C
    description: Referral type master table
    is_enum_table: true
    columns:
      - name: RFL_TYPE_C
        type: INTEGER
        description: Referral type category list.
      - name: NAME
        type: VARCHAR
        description: Referral type name

  - name: CLARITY_IMMUNZATN
    data_source: Epic Clarity
    primary_key: IMMUNZATN_ID
    description: Immunization/vaccine master table
    columns:
      - name: IMMUNZATN_ID
        type: INTEGER
        description: Unique immunization type identifier
      - name: IMMUNZATN_NAME
        type: VARCHAR
        description: Vaccine name (MMR, DTaP, Polio, HepB, etc.)

  - name: HSP_ACCOUNT
    data_source: Epic Clarity
    primary_key: HSP_ACCOUNT_ID
    description: Hospital account information (inpatient stays)
    columns:
      - name: HSP_ACCOUNT_ID
        type: NUMERIC(18,0)
        description: Unique identifier for the hospital account
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient ID for the hospital account
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: ADM_DATE_TIME
        type: DATETIME
        description: Admission date and time
      - name: DISCH_DATE_TIME
        type: DATETIME
        description: Discharge date and time
      - name: PRIM_ENC_CSN_ID
        type: INTEGER
        description: Primary encounter CSN for the hospital stay
        foreign_key:
          table: PAT_ENC
          column: PAT_ENC_CSN_ID
          cardinality: one-to-one
      - name: TOT_CHGS
        type: NUMERIC(18,2)
        description: Total charges for the hospital account
      - name: TOT_PMTS
        type: NUMERIC(18,2)
        description: Total payments received
      - name: TOT_ADJ
        type: NUMERIC(18,2)
        description: Total adjustments
      - name: ACCT_BASECLS_HA_C
        type: INTEGER
        description: Account base class (1=Inpatient, 2=Outpatient/ED)

  - name: HSP_ACCT_DX_LIST
    data_source: Epic Clarity
    primary_key: "HSP_ACCOUNT_ID, LINE"
    description: Hospital account final diagnosis list (Inpatient Discharge Diagnosis).
    columns:
      - name: HSP_ACCOUNT_ID
        type: NUMERIC(18,0)
        description: Hospital account identifier
        foreign_key:
          table: HSP_ACCOUNT
          column: HSP_ACCOUNT_ID
          cardinality: many-to-one
      - name: DX_ID
        type: NUMERIC(18,0)
        description: Diagnosis ID
        foreign_key:
          table: CLARITY_EDG
          column: DX_ID
          cardinality: many-to-one
      - name: LINE
        type: INTEGER
        description: Line number (ordering)

  - name: CLARITY_EDG
    data_source: Epic Clarity
    primary_key: DX_ID
    description: Diagnosis master file
    columns:
      - name: DX_ID
        type: NUMERIC(18,0)
        description: Diagnosis identifier
      - name: DX_NAME
        type: VARCHAR(200)
        description: Diagnosis name
      - name: CURRENT_ICD10_LIST
        type: VARCHAR(254)
        description: Current mapped ICD-10-CM codes

  - name: ORDER_MED
    data_source: Epic Clarity
    primary_key: ORDER_MED_ID
    description: Medication orders (prescriptions)
    columns:
      - name: ORDER_MED_ID
        type: NUMERIC(18,0)
        description: Unique medication order identifier
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient ID
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: PAT_ENC_CSN_ID
        type: INTEGER
        description: Encounter CSN
        foreign_key:
          table: PAT_ENC
          column: PAT_ENC_CSN_ID
          cardinality: many-to-one
      - name: MEDICATION_ID
        type: NUMERIC(18,0)
        description: Medication identifier
        foreign_key:
          table: CLARITY_MEDICATION
          column: MEDICATION_ID
          cardinality: many-to-one
      - name: DISPLAY_NAME
        type: VARCHAR(200)
        description: Display name of the medication order
      - name: ORDER_STATUS_C
        type: INTEGER
        description: Order status code

  - name: CLARITY_MEDICATION
    data_source: Epic Clarity
    primary_key: MEDICATION_ID
    description: Medication master file
    columns:
      - name: MEDICATION_ID
        type: NUMERIC(18,0)
        description: Unique medication identifier
      - name: NAME
        type: VARCHAR(200)
        description: Medication name
      - name: PHARM_CLASS_C
        type: INTEGER
        description: Pharmaceutical class code
      - name: COST
        type: NUMERIC(18,2)
        description: Medication cost
      - name: GENERIC_NAME
        type: VARCHAR(200)
        description: Generic name

  - name: ORDER_PROC
    data_source: Epic Clarity
    primary_key: ORDER_PROC_ID
    description: Procedure orders
    columns:
      - name: ORDER_PROC_ID
        type: NUMERIC(18,0)
        description: Unique procedure order identifier
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient ID
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: PAT_ENC_CSN_ID
        type: INTEGER
        description: Encounter CSN
        foreign_key:
          table: PAT_ENC
          column: PAT_ENC_CSN_ID
          cardinality: many-to-one
      - name: RESULT_LAB_ID
        type: VARCHAR(18)
        description: Result Lab ID (if applicable)
      - name: ORDERING_DATE
        type: DATETIME
        description: Date procedure was ordered
      - name: ORDER_TYPE_C
        type: INTEGER
        description: Order type code
      - name: PROC_ID
        type: NUMERIC(18,0)
        description: Procedure identifier
        foreign_key:
          table: CLARITY_EAP
          column: PROC_ID
          cardinality: many-to-one
      - name: DESCRIPTION
        type: VARCHAR(254)
        description: Procedure description
      - name: ORDER_STATUS_C
        type: INTEGER
        description: Order status code

  - name: CLARITY_EAP
    data_source: Epic Clarity
    primary_key: PROC_ID
    description: Procedure master file
    columns:
      - name: PROC_ID
        type: NUMERIC(18,0)
        description: Procedure identifier
      - name: PROC_NAME
        type: VARCHAR(200)
        description: Procedure name
      - name: PROC_CODE
        type: VARCHAR(50)
        description: Procedure code (CPT/HCPCS)

