      - name: APPT_STATUS_C
        type: INTEGER
        description: Appointment status
      - name: DEPARTMENT_ID
        type: INTEGER
        description: Department identifier
        foreign_key:
          table: CLARITY_DEP
          column: DEPARTMENT_ID
          cardinality: many-to-one
      - name: PROV_ID
        type: VARCHAR(18)
        description: Appointment provider identifier
        foreign_key:
          table: CLARITY_SER
          column: PROV_ID
          cardinality: many-to-one
      - name: APPT_MADE_DTTM
        type: DATETIME
        description: When appointment was scheduled
      - name: CHECKIN_DTTM
        type: DATETIME
        description: When patient checked in
      - name: CHECKOUT_DTTM
        type: DATETIME
        description: When patient checked out
      - name: ARVL_LIST_REMOVE_DTTM
        type: INTEGER
        description: When patient was removed from the arrival list
      - name: ROOMED_DTTM
        type: DATETIME
        description: When patient was roomed
      - name: NURSE_LEAVE_DTTM
        type: DATETIME
