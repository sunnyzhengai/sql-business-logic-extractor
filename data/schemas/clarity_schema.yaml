          table: REFERRAL
          column: REFERRAL_ID
          cardinality: many-to-one

  - name: ORDER_RESULTS
    data_source: Epic Clarity
    primary_key: ORDER_PROC_ID
    description: Result of a laboratory or diagnostic test from clinical system orders. The table extracts only the last orders (ORD) contact for each ORD record.
    columns:
      - name: ORDER_PROC_ID
        type: NUMERIC(18,0)
        description: Unique procedure order identifier
        foreign_key:
          table: ORDER_PROC
          column: ORDER_PROC_ID
          cardinality: many-to-one
      - name: LINE
        type: INTEGER
        description: Line number of each result component within each ordered procedure.
      - name: ORD_DATE_REAL   
        type: FLOAT
        description: the date each order was placed in your system. The integer portion of the number specifies the date the order was placed.
      - name: RESULT_DATE 
        type: DATETIME
        description: The date the technician ran the tests for each order in calendar format.
      - name: COMPONENT_ID
        type: NUMERIC(18,0)
        description: the unique ID of each result component for each result.
      - name: PAT_ID
        type: VARCHAR(18)
        description: Patient identifier
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: PAT_ENC_CSN_ID
        type: INTEGER
        description: Encounter CSN
        foreign_key:
          table: PAT_ENC
          column: PAT_ENC_CSN_ID
          cardinality: many-to-one
      - name: DX_ID
        type: NUMERIC(18,0)
        description: Diagnosis associated with the result
        foreign_key:
          table: CLARITY_EDG
          column: DX_ID
          cardinality: many-to-one
      - name: ORDER_VALUE
        type: VARCHAR(254)
        description: The value returned for each result component, in short free text format. 
      - name: ORD_NUM_VALUE
        type: FLOAT
        description: The numeric value returned for each result component where applicable. If the value contains any non-numeric characters, the value will display as 9999999.
      - name: RESULT_FLAG_C
        type: VARCHAR(66)
        description: The category value associated ith a standard HL7 flag code to mark each component result as abnormal. Any value in this field not equal to 1 is considered abnormal.
        values: 
        - code: 1
          name: (NONE)
        - code: 2
          name: Abnormal
        - code: 3
          name: Panic
        - code: 4
          name: Low
        - code: 5
          name: High
        - code: 6
          name: Low Panic
        - code: 7
          name: High Panic
        - code: 8
          name: Low Off-Scale
        - code: 9
          name: High Off-Scale
        - code: 10
          name: Sig Change Up
        - code: 11
          name: Sig Change Down
        - code: 12
          name: Better
        - code: 13
          name: Worse
        - code: 14
          name: Sensitive
        - code: 15
          name: Resistant
        - code: 16
          name: Intermediate
        - code: 17
          name: Moderately Sensitive
        - code: 18
          name: Very Sensitive 
      - name: REFERENCE_LOW
        type: VARCHAR(50)
        description: The lowest acceptable value for the result component. If the value in this column is a number or structured numeric, the numbers will be stored in M interna. format, using a period as the decimal separator.
      - name: REFERENCE_HIGH
        type: VARCHAR(50)
        description: The highest acceptable value for the result component. If the value in this column is a number or structured numeric, the numbers will be stored in M interna. format, using a period as the decimal separator.
      - name: REFERENCE_UNIT
        type: VARCHAR(100)
        description: The units of the result component value.
      - name: REFERENCE_STATUS_C
        type: INTEGER
        description: The category value corresponding to the status of each result record.
        values:
          - code: 2
            name: Premilinary
          - code: 3
            name: Final
          - code: 4
            name: Corrected
          - code: 5
            name: Incomplete
      - name: LAB_STATUS_C
        type: INTEGER
        description: The category value associated with the status of each result.
        values:
          - code: 1
            name: In process
          - code: 2
            name: Preliminary result 
          - code: 3
            name: Final result
          - code: 4
            name: Edited 
          - code: 5
            name: Edited result - FINAL
      - name: RESULT_TIME
        type: DATETIME
        description: The time the technician ran the tests for each order in calendar format..
      - name: RESULT_IN_RANGE_YN
        type: VARCHAR(1)
        description: A Yes/No category value to indicae whether a result has been verified to be within its reference range.  

  - name: PROBLEM_LIST
    data_source: Epic Clarity
    primary_key: PROBLEM_LIST_ID
    description: >-
      This table contains data from patient problem lists. The data reflects the current status of all problems on the patient's problem list. Each problem is marked
      as active until it becomes (and is marked) Resolved or Deleted.
    columns:
      - name: PROBLEM_LIST_ID
        type: NUMERIC(18,0)
        description: Unique ID of this problem list entry.
      - name: PAT_ID  
        type: VARCHAR(18)
        description: Patient ID
        foreign_key:
          table: PATIENT
          column: PAT_ID
          cardinality: many-to-one
      - name: DX_ID
        type: NUMERIC(18,0)
        description: Diagnosis ID
        foreign_key:
          table: CLARITY_EDG
          column: DX_ID
          cardinality: many-to-one
      - name: NOTED_DATE
        type: DATETIME
        description: Represents the first possible date that a problem could have been noted/onset on. By default, this is the problem's date of entry into the problem list. The intent of this field is to allow users to change this date to the date the problem was first diagnosied if that is different than the entry date..
      - name: RESOLVED_DATE 
        type: DATETIME
        description: THE DATE THE PROBLEM WAS RESOLVED IN CALENDAR FORMAT.
      - name: DATE_OF_ENTRY
        type: DATETIME
        description: The date THE SPECIFIC PROBLEM WAS LST EDITED.
      - name: ENTRY_USER_ID
        type: VARCHAR(18)
        description: The user who entered the problem into the problem list.
      
  - name: ARPB_TRANSACTIONS    
