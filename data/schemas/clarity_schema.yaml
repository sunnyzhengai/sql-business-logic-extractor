  - name: ZC_ENTRY_SOURCE
    data_source: Epic Clarity
    primary_key: ENTRY_SOURCE_C
    description: Entry source master table
    is_enum_table: true
    columns:
      - name: ENTRY_SOURCE_C
        type: INTEGER
        description: Entry source code (primary key)
      - name: NAME
        type: VARCHAR
        description: Entry source name
    values:
      - code: 1
        name: Professional Billing
      - code: 2
        name: Cadence
      - code: 3
        name: Tapestry
      - code: 4
        name: EpicCare
      - code: 5
        name: ADT
      - code: 6
