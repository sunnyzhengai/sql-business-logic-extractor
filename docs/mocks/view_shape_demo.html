<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>View shapes -- Demo community (4 mock views)</title>
<style>
  body { font-family: sans-serif; margin: 24px; color: #333; background: #fafafa; }
  h1 { font-size: 18px; margin: 0 0 6px; }
  p.meta { color: #666; font-size: 13px; margin: 0 0 18px; }
  section { margin-bottom: 24px; }
  section h2 { font-size: 14px; margin: 0 0 8px; color: #555; }
  /* Compare picker: two dropdowns + a Show-all toggle. Default state
     hides everything except the first two views so the page opens
     "ready to compare" rather than "wall of panels". */
  .controls { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px;
               padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 16px;
               align-items: center; }
  .controls label { font-size: 13px; }
  .controls select { font-family: sans-serif; font-size: 13px; padding: 3px 6px;
                       min-width: 220px; max-width: 360px; }
  .controls button { font-family: sans-serif; font-size: 13px; padding: 4px 10px;
                       cursor: pointer; }
  /* Each per-view panel sits inside .panel-grid as flex-wrapping. JS
     toggles each panel's display based on the dropdown selection. */
  .panel-grid { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start; }
  .panel { scroll-margin-top: 12px; }
  .panel.hidden { display: none; }
</style>
</head>
<body>
<h1>View shapes -- Demo community (4 mock views)</h1>
<p class="meta">4 view(s)  &middot;  4 substrate table(s)  &middot;  3 substrate edge(s)  &middot;  Use the Left/Right dropdowns to pick a pair; <b>Show all</b> to scroll through all panels.</p>
<section class="controls">
  <label>Left:&nbsp;<select id="cmp-a"><option value="VW_A" selected>VW_A</option><option value="VW_B">VW_B</option><option value="VW_C">VW_C</option><option value="VW_D">VW_D</option></select></label>
  <label>Right:&nbsp;<select id="cmp-b"><option value="VW_A">VW_A</option><option value="VW_B" selected>VW_B</option><option value="VW_C">VW_C</option><option value="VW_D">VW_D</option></select></label>
  <button id="cmp-all" type="button">Show all</button>
  <button id="cmp-pair" type="button">Show selected pair</button>
</section>

<div class="panel" data-view="VW_B" id="view-VW_B"><svg width="375" height="200" viewBox="0 0 375 200" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; border:1px solid #d0d0d0; border-radius:4px; display:block;"><text x="187" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">VW_B  (2/4 tables)</text><path d="M283,61 L178,61" stroke="#dcdcdc" stroke-width="1.2" stroke-dasharray="4,4" fill="none" /><path d="M73,61 L178,125" stroke="#dcdcdc" stroke-width="1.2" stroke-dasharray="4,4" fill="none" /><path d="M73,61 L178,61" stroke="#2c7fb8" stroke-width="2.4" fill="none" /><g><title>CLARITY_DEP</title><circle cx="283" cy="61" r="13" fill="#f0f0f0" stroke="#bdbdbd" stroke-width="1.5" stroke-dasharray="3,3" /><text x="283" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="normal" fill="#9e9e9e">CLARITY_DEP</text></g><g><title>ZC_PATIENT_STATUS</title><circle cx="178" cy="125" r="13" fill="#f0f0f0" stroke="#bdbdbd" stroke-width="1.5" stroke-dasharray="3,3" /><text x="178" y="152" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="normal" fill="#9e9e9e">ZC_PATIENT_STATUS</text></g><g><title>PATIENT</title><circle cx="73" cy="61" r="13" fill="#2c7fb8" stroke="#1a5d8a" stroke-width="1.5" /><text x="73" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">PATIENT</text></g><g><title>PAT_ENC</title><circle cx="178" cy="61" r="13" fill="#2c7fb8" stroke="#1a5d8a" stroke-width="1.5" /><text x="178" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">PAT_ENC</text></g></svg></div>

  </div>
</section>
<script>
(function() {
  // Pick exactly two panels to display (the L/R dropdown values);
  // everything else is hidden via the .hidden class.
  function showPair() {
    var a = document.getElementById('cmp-a').value;
    var b = document.getElementById('cmp-b').value;
    document.querySelectorAll('[data-view]').forEach(function(el) {
      var v = el.getAttribute('data-view');
      el.classList.toggle('hidden', v !== a && v !== b);
    });
  }
  // Drop the .hidden class everywhere -- the scroll-through view.
  function showAll() {
    document.querySelectorAll('[data-view]').forEach(function(el) {
      el.classList.remove('hidden');
    });
  }
  document.getElementById('cmp-a').addEventListener('change', showPair);
  document.getElementById('cmp-b').addEventListener('change', showPair);
  document.getElementById('cmp-all').addEventListener('click', showAll);
  document.getElementById('cmp-pair').addEventListener('click', showPair);
  // Initial state: show only the first two views (the default
  // dropdown values). Single-view communities just show the one.
  showPair();
})();
</script>
</body>
</html>
